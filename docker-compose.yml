services:
  media-server:
    build: .

    container_name: media-server

    restart: unless-stopped

    env_file:
      - .env

    ports:
      - "5000:5000"

    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3